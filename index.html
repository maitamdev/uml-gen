<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UML Diagram Generator - Tạo sơ đồ UML tự động</title>
    <meta
      name="description"
      content="Ứng dụng tạo sơ đồ UML tự động từ mô tả đề tài. Hỗ trợ Use Case, Activity, Sequence, Class, State và ERD."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>"
    />
  </head>
  <body>
    <div id="app">
      <!-- Animated mesh background -->
      <div class="bg-mesh"></div>
      <div class="bg-grid"></div>
      <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
      </div>

      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <div class="logo-mark">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect x="2" y="2" width="24" height="24" rx="6" stroke="url(#logo-grad)" stroke-width="2.5"/>
                <path d="M9 9h4v4H9zM15 9h4v4h-4zM9 15h4v4H9zM15 15h4v4h-4z" fill="url(#logo-grad)" opacity="0.7"/>
                <defs>
                  <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                    <stop stop-color="#818cf8"/>
